<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Our Services - Austin Global Services">
  <title>Austin Global Services | Services</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="img/favicon.png">
  <style>
    .service-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }
    .service-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: all 0.3s;
    }
    .service-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 25px rgba(232, 73, 29, 0.15);
    }
    .order-panel {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      width: 90%;
      max-width: 500px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      z-index: 2000;
      padding: 2rem;
    }
    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 1999;
    }
  </style>
</head>
<body>
  <!-- Header same as before -->
  <header>
    <div class="container">
      <div id="branding">
        <h1><span class="highlight">Austin Global</span> Services</h1>
      </div>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li class="current"><a href="services.html">Services</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section id="main">
    <div class="container">
      <h1 class="page-title">Our Services</h1>
      <p>Click on any service to place an order</p>

      <div class="service-grid" id="serviceGrid">
        <!-- Services will be populated by JS -->
      </div>
    </div>
  </section>

  <!-- Order Panel -->
  <div class="overlay" id="overlay"></div>
  <div class="order-panel" id="orderPanel">
    <h2 id="selectedService"></h2>
    <div>
      <label>Quantity:</label><br>
      <button onclick="changeQty(-1)">–</button>
      <span id="quantity" style="margin:0 15px;font-size:1.3rem;">1</span>
      <button onclick="changeQty(1)">+</button>
    </div><br>

    <label>Print Type:</label><br>
    <select id="printType">
      <option value="Black & White">Black & White</option>
      <option value="Colored">Colored</option>
      <option value="Custom">Custom (specify below)</option>
    </select><br><br>

    <label>Additional Notes / Description:</label><br>
    <textarea id="notes" rows="3" placeholder="Any special instructions..."></textarea><br><br>

    <label>Upload Document/Image (optional):</label><br>
    <input type="file" id="fileUpload" accept="image/*,.pdf"><br><br>

    <label>
      <input type="checkbox" id="delivery"> I want Delivery
    </label><br><br>

    <div id="locationField" style="display:none;">
      <label>Delivery Location:</label><br>
      <input type="text" id="location" placeholder="Full address">
    </div><br>

    <button class="button_1" onclick="submitOrder()" style="width:100%;padding:16px;">SUBMIT ORDER</button>
    <button onclick="closePanel()" style="margin-top:10px;width:100%;padding:12px;background:#666;">Cancel</button>
  </div>

  <footer>
    <p>&copy; 2026 Austin Global Services. All Rights Reserved.</p>
  </footer>

  <script src="./js/script.js"></script>
</body>
</html>
